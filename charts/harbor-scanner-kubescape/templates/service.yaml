apiVersion: v1
kind: Service
metadata:
  name: {{ include "harbor-scanner-kubescape.fullname" . }}
  labels:
    {{- include "harbor-scanner-kubescape.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP
      name: api
      appProtocol: {{ if .Values.tls.enabled }}https{{ else }}http{{ end }}
  selector:
    {{- include "harbor-scanner-kubescape.selectorLabels" . | nindent 4 }}
