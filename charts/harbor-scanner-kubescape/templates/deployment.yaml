{{- $multiReplica := gt (int .Values.replicaCount) 1 -}}
{{- $usingMemory := or (not .Values.persistence) (eq (default "memory" .Values.persistence.backend) "memory") -}}
{{- if and $multiReplica $usingMemory (not .Values.acknowledgeUnsafeMultiReplica) -}}
{{- fail "replicaCount > 1 is unsafe with persistence.backend=memory: scan state is per-pod and Harbor polls would 404 on jobs accepted by another replica. Set persistence.backend=redis (recommended) or acknowledgeUnsafeMultiReplica=true to override. See https://github.com/goharbor/harbor-scanner-kubescape/issues/2 and #15." -}}
{{- end -}}
{{- if and (eq (default "memory" .Values.persistence.backend) "redis") (not .Values.persistence.redis.url) (not .Values.persistence.redis.secretName) -}}
{{- fail "persistence.backend=redis requires either persistence.redis.url or persistence.redis.secretName to be set." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor-scanner-kubescape.fullname" . }}
  labels:
    {{- include "harbor-scanner-kubescape.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "harbor-scanner-kubescape.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "harbor-scanner-kubescape.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "harbor-scanner-kubescape.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SCANNER_API_ADDR
              value: {{ .Values.scanner.apiAddr | quote }}
            - name: KUBEVULN_URL
              value: {{ .Values.scanner.kubevulnURL | quote }}
            - name: KUBEVULN_NAMESPACE
              value: {{ .Values.scanner.kubevulnNamespace | quote }}
            - name: PERSISTENCE_BACKEND
              value: {{ default "memory" .Values.persistence.backend | quote }}
            {{- if eq (default "memory" .Values.persistence.backend) "redis" }}
            {{- if .Values.persistence.redis.secretName }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.persistence.redis.secretName }}
                  key: url
            {{- else }}
            - name: REDIS_URL
              value: {{ .Values.persistence.redis.url | quote }}
            {{- end }}
            - name: REDIS_JOB_TTL
              value: {{ .Values.persistence.redis.ttl | quote }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: SCANNER_API_TLS_CERT
              value: "/etc/harbor-scanner-kubescape/tls/tls.crt"
            - name: SCANNER_API_TLS_KEY
              value: "/etc/harbor-scanner-kubescape/tls/tls.key"
            {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: tls
              mountPath: /etc/harbor-scanner-kubescape/tls
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /probe/healthy
              port: api
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /probe/ready
              port: api
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: tls
          secret:
            secretName: {{ required "tls.secretName is required when tls.enabled is true" .Values.tls.secretName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
