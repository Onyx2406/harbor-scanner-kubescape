apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor-scanner-kubescape.fullname" . }}
  labels:
    {{- include "harbor-scanner-kubescape.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "harbor-scanner-kubescape.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "harbor-scanner-kubescape.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "harbor-scanner-kubescape.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SCANNER_API_ADDR
              value: {{ .Values.scanner.apiAddr | quote }}
            - name: KUBEVULN_URL
              value: {{ .Values.scanner.kubevulnURL | quote }}
            - name: KUBEVULN_NAMESPACE
              value: {{ .Values.scanner.kubevulnNamespace | quote }}
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /probe/healthy
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /probe/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
