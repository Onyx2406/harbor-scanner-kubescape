{{- if and (gt (int .Values.replicaCount) 1) (not .Values.acknowledgeUnsafeMultiReplica) -}}
{{- fail "replicaCount > 1 is not safe: scan state is held in-memory and is not shared across pods, causing Harbor polls to 404 on jobs accepted by other replicas. Set acknowledgeUnsafeMultiReplica=true to override (and accept the broken behavior), or keep replicaCount: 1. See https://github.com/goharbor/harbor-scanner-kubescape/issues/2." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor-scanner-kubescape.fullname" . }}
  labels:
    {{- include "harbor-scanner-kubescape.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "harbor-scanner-kubescape.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "harbor-scanner-kubescape.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "harbor-scanner-kubescape.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SCANNER_API_ADDR
              value: {{ .Values.scanner.apiAddr | quote }}
            - name: KUBEVULN_URL
              value: {{ .Values.scanner.kubevulnURL | quote }}
            - name: KUBEVULN_NAMESPACE
              value: {{ .Values.scanner.kubevulnNamespace | quote }}
            {{- if .Values.tls.enabled }}
            - name: SCANNER_API_TLS_CERT
              value: "/etc/harbor-scanner-kubescape/tls/tls.crt"
            - name: SCANNER_API_TLS_KEY
              value: "/etc/harbor-scanner-kubescape/tls/tls.key"
            {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: tls
              mountPath: /etc/harbor-scanner-kubescape/tls
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /probe/healthy
              port: api
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /probe/ready
              port: api
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: tls
          secret:
            secretName: {{ required "tls.secretName is required when tls.enabled is true" .Values.tls.secretName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
