replicaCount: 1

# Scan state is held in an in-memory store and is not shared across pods, so
# Harbor's polling requests can land on a replica that has no record of the
# job and return 404. The chart fails installation if replicaCount > 1 unless
# this flag is set to true, in which case you accept the broken-by-design
# behavior. Track https://github.com/goharbor/harbor-scanner-kubescape/issues/2
# for the shared-backend (Redis/etc.) plan.
acknowledgeUnsafeMultiReplica: false

image:
  repository: ghcr.io/goharbor/harbor-scanner-kubescape
  tag: ""  # Defaults to Chart appVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

# Scanner adapter configuration
scanner:
  # Address to listen on. Default is plain HTTP on :8080. If tls.enabled is
  # true, set this to ":8443" (or your preferred TLS port).
  apiAddr: ":8080"
  # Base URL of the kubevuln service in the cluster
  kubevulnURL: "http://kubevuln.kubescape.svc.cluster.local:8080"
  # Kubernetes namespace where Kubescape components run
  kubevulnNamespace: "kubescape"

# Persistence backend for scan-job state.
#
#   memory  (default) in-process map. Single-pod, non-durable. Restart loses
#                     all in-flight and recently-finished scans. Fine for
#                     local dev or low-stakes deployments.
#   redis             Redis-backed store. Survives restart/rollout and lets
#                     replicaCount > 1 work correctly. Recommended for prod.
#                     See https://github.com/goharbor/harbor-scanner-kubescape/issues/15.
persistence:
  backend: memory
  redis:
    # Connection URL parsed by go-redis. Examples:
    #   redis://harbor-redis-master.harbor.svc.cluster.local:6379/0
    #   redis://:password@host:6379/0
    # Leave empty when backend=memory.
    url: ""
    # Optional: name of an existing Secret holding REDIS_URL under the key
    # "url". If set, takes precedence over .Values.persistence.redis.url so
    # passwords don't end up in plain-text values.
    secretName: ""
    # Per-key TTL. A scan job lives this long after its last update. Long
    # enough to outlast Harbor's poll loop; short enough to bound storage.
    ttl: "1h"

# TLS configuration. When enabled, the scanner serves HTTPS using the cert/key
# from the referenced Secret (which must contain `tls.crt` and `tls.key` keys,
# i.e. a kubernetes.io/tls Secret). When disabled, the scanner serves plain
# HTTP and TLS termination is expected at the ingress / service mesh layer.
tls:
  enabled: false
  # Name of an existing kubernetes.io/tls Secret in the same namespace.
  secretName: ""

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
